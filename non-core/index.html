<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WinMac OS 1.0 — Sistema de Facturación Electrónica DIAN Colombia">
  <title>WinMac OS 1.0 — E-Invoice System</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Phosphor Icons — retro-friendly icon set inspired by classic Mac -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
</head>
<body>

  <!-- Desktop -->
  <div id="desktop">

    <!-- Menu Bar -->
    <div id="menubar">
      <div class="logo-icon">
        <!-- Classic Mac Apple-style icon -->
        <svg viewBox="0 0 24 24" fill="var(--dark)">
          <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.79 16.16 4.36 9.58 8.73 9.36c1.25.06 2.12.7 2.87.74.93-.19 1.82-.87 2.86-.78 1.21.1 2.13.58 2.72 1.48-2.5 1.5-1.9 4.81.36 5.73-.49 1.28-1.12 2.54-2.49 3.75zM12.03 9.3C11.88 7.14 13.64 5.36 15.7 5.2c.3 2.44-2.22 4.26-3.67 4.1z"/>
        </svg>
      </div>
      <div class="menu-item" style="font-weight:900;">WinMac OS</div>
      <div class="menu-item">Archivo</div>
      <div class="menu-item">Editar</div>
      <div class="menu-item">Vista</div>
      <div class="menu-item">Ayuda</div>
      <div class="clock" id="clock">00:00:00</div>
    </div>

    <!-- Desktop Icons Area -->
    <div id="desktop-area">

      <!-- Icon 1: Empleados -->
      <div class="desktop-icon" id="icon-employees" ondblclick="openEmployeeWindow()">
        <div class="icon-img">
          <i class="ph ph-users-three" style="font-size:68px;"></i>
        </div>
        <span class="icon-label">Empleados</span>
      </div>

      <!-- Icon 2: Facturación DIAN -->
      <div class="desktop-icon" id="icon-invoice" ondblclick="openInvoiceWindow()">
        <div class="icon-img">
          <i class="ph ph-receipt" style="font-size:68px;"></i>
        </div>
        <span class="icon-label">Facturación DIAN</span>
      </div>

      <!-- Icon 3: Catálogo -->
      <div class="desktop-icon" id="icon-catalog" ondblclick="openCatalogWindow()">
        <div class="icon-img">
          <i class="ph ph-folder-open" style="font-size:68px;"></i>
        </div>
        <span class="icon-label">Catálogo</span>
      </div>

      <!-- Watermark -->
      <div id="watermark">
        <h1>WinMac OS 1.0</h1>
        <p>WinMac Soft inc. 2026</p>
      </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
      <div class="taskbar-item" onclick="openEmployeeWindow()">
        <i class="ph ph-users-three"></i> Empleados
      </div>
      <div class="taskbar-item" onclick="openInvoiceWindow()">
        <i class="ph ph-receipt"></i> Facturación
      </div>
      <div class="taskbar-item" onclick="openCatalogWindow()">
        <i class="ph ph-folder-open"></i> Catálogo
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Window Templates (hidden, generated by JS) -->

  <script src="app.js"></script>
</body>
</html>
